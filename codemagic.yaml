workflows:
  ios-release:
    name: Smashrite Core – iOS (Auto-sign + TestFlight)
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - smashrite-vars  # Must contain the 3 APP_STORE_CONNECT_ vars listed below
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.smashrite.core.ios
      vars:
        BUNDLE_ID: "com.smashrite.core.ios"
        APPLE_TEAM_ID: "6N74MV2D96"
        COCOAPODS_DISABLE_STATS: "true"

    # ---------------------------------------------------------------------------
    # Required env vars in the "smashrite-vars" group on Codemagic dashboard:
    #
    #   APP_STORE_CONNECT_ISSUER_ID   → App Store Connect → Users & Access → API → Issuer ID
    #   APP_STORE_CONNECT_KEY_ID      → App Store Connect → Users & Access → API → Key ID
    #   APP_STORE_CONNECT_PRIVATE_KEY → Full contents of the downloaded .p8 file
    #
    # No certificates or provisioning profiles needed — Codemagic automatic
    # signing handles everything via the App Store Connect API key above.
    # ---------------------------------------------------------------------------

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:

      # ── 1. Clean slate ─────────────────────────────────────────────────────
      - name: Flutter clean
        script: flutter clean

      # ── 2. Fetch Dart/Flutter dependencies ────────────────────────────────
      - name: Flutter deps
        script: flutter pub get

      # ── 3. Replace Bundle ID (Android keeps com.smashrite.core; iOS gets .ios suffix) ──
      - name: Replace Bundle ID for iOS
        script: |
          set -e
          OLD_ID="com.smashrite.core"
          NEW_ID="com.smashrite.core.ios"
          echo "🔁 Replacing $OLD_ID → $NEW_ID"

          # Runner project (primary location)
          sed -i '' "s/$OLD_ID/$NEW_ID/g" ios/Runner.xcodeproj/project.pbxproj

          # Info.plist (safe to patch even if not strictly needed)
          sed -i '' "s/$OLD_ID/$NEW_ID/g" ios/Runner/Info.plist || true

          # Any other iOS config files that might reference the old ID
          grep -rl "$OLD_ID" ios \
            --include="*.plist" \
            --include="*.pbxproj" \
            --include="*.xcconfig" \
            | xargs -I{} sed -i '' "s/$OLD_ID/$NEW_ID/g" || true

          echo "✅ Bundle ID replaced"

      # ── 4. Keychain + provisioning profiles (ONE call — do not repeat) ────
      - name: Initialize keychain
        script: keychain initialize

      # ── 5. Sanity-check required env vars ─────────────────────────────────
      - name: Verify required env vars
        script: |
          set -e
          fail() { echo "❌ $1 is missing or empty"; exit 1; }
          req()  { [ -n "$2" ] && echo "✅ $1 present" || fail "$1"; }
          req APP_STORE_CONNECT_ISSUER_ID   "$APP_STORE_CONNECT_ISSUER_ID"
          req APP_STORE_CONNECT_KEY_ID      "$APP_STORE_CONNECT_KEY_ID"
          req APP_STORE_CONNECT_PRIVATE_KEY "$APP_STORE_CONNECT_PRIVATE_KEY"
          echo "ℹ️  All required secrets present."
          echo "ℹ️  Certificate & provisioning profile managed by Codemagic automatic signing."

      - name: Debug API key presence
        script: |
          echo "KEY_ID: $APP_STORE_CONNECT_KEY_ID"
          echo "ISSUER_ID: $APP_STORE_CONNECT_ISSUER_ID"
          echo "KEY LENGTH: ${#APP_STORE_CONNECT_PRIVATE_KEY}"

      # ── 6. Force iPhone-only (no iPad) ────────────────────────────────────
      - name: Force iPhone-only build
        script: |
          set -e
          PBX="ios/Runner.xcodeproj/project.pbxproj"
          sed -i '' 's/TARGETED_DEVICE_FAMILY = "1,2"/TARGETED_DEVICE_FAMILY = 1/g' "$PBX"
          sed -i '' 's/TARGETED_DEVICE_FAMILY = 1,2/TARGETED_DEVICE_FAMILY = 1/g'   "$PBX"
          echo "✅ Forced TARGETED_DEVICE_FAMILY = 1 (iPhone-only)"
          grep -n "TARGETED_DEVICE_FAMILY" "$PBX"

      - name: Remove iPad orientations from Info.plist
        script: |
          /usr/libexec/PlistBuddy -c \
            "Delete UISupportedInterfaceOrientations~ipad" \
            ios/Runner/Info.plist 2>/dev/null \
            && echo "✅ iPad orientations removed" \
            || echo "ℹ️  No iPad orientations key found — skipping"

      # ── 7. iOS 14.0 enforcement — BEFORE pod install ──────────────────────
      - name: Enforce iOS 14.0 (Podfile + Runner project + Flutter configs)
        script: |
          set -e
          cd ios

          # Podfile: set or update platform line
          if grep -qE "^platform :ios," Podfile; then
            sed -i.bak "s/^platform :ios, *['\"][0-9.]*['\"]/platform :ios, '14.0'/" Podfile
          else
            sed -i.bak "1s;^;platform :ios, '14.0'\n;" Podfile
          fi
          rm -f Podfile.bak
          cd ..

          # Runner.xcodeproj
          PBX="ios/Runner.xcodeproj/project.pbxproj"
          sed -i '' -E \
            's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]+;/IPHONEOS_DEPLOYMENT_TARGET = 14.0;/g' \
            "$PBX"

          # Flutter/AppFrameworkInfo.plist
          FWPLIST="ios/Flutter/AppFrameworkInfo.plist"
          if [ -f "$FWPLIST" ]; then
            /usr/libexec/PlistBuddy -c "Set :MinimumOSVersion 14.0" "$FWPLIST" 2>/dev/null \
              || /usr/libexec/PlistBuddy -c "Add :MinimumOSVersion string 14.0" "$FWPLIST"
          fi

          # Generated.xcconfig (Flutter CLI may pin a lower min)
          GEN="ios/Flutter/Generated.xcconfig"
          if [ -f "$GEN" ]; then
            if grep -q "^IPHONEOS_DEPLOYMENT_TARGET=" "$GEN"; then
              sed -i '' -E \
                's/^IPHONEOS_DEPLOYMENT_TARGET=.*/IPHONEOS_DEPLOYMENT_TARGET=14.0/' "$GEN"
            else
              printf "\nIPHONEOS_DEPLOYMENT_TARGET=14.0\n" >> "$GEN"
            fi
          fi

          echo "✅ iOS 14.0 enforced (pre-pod)"

      # ── 8. permission_handler macros in Podfile ───────────────────────────
      - name: Inject permission_handler macros into Podfile
        script: |
          set -euo pipefail
          PODFILE="ios/Podfile"
          [ -f "$PODFILE" ] || { echo "❌ Podfile not found"; exit 1; }

          if grep -qE "^[[:space:]]*post_install do \|installer\|" "$PODFILE"; then
            echo "🧩 post_install found → injecting macros inside it"
            awk '
            BEGIN { inserted=0 }
            {
              print $0
              if (!inserted && $0 ~ /^[[:space:]]*post_install do \|installer\|/) {
                print "  # --- permission_handler macros (injected by CI) ---"
                print "  installer.pods_project.targets.each do |target|"
                print "    target.build_configurations.each do |config|"
                print "      defs = config.build_settings[\"GCC_PREPROCESSOR_DEFINITIONS\"] || [\"$(inherited)\"]"
                print "      defs |= [\"PERMISSION_NOTIFICATIONS=1\"]"
                print "      config.build_settings[\"GCC_PREPROCESSOR_DEFINITIONS\"] = defs"
                print "    end"
                print "  end"
                print "  # --- end permission_handler macros ---"
                inserted=1
              }
            }' "$PODFILE" > "$PODFILE.tmp" && mv "$PODFILE.tmp" "$PODFILE"
          else
            echo "➕ No post_install found → appending one"
            cat >> "$PODFILE" <<'RUBY'

          # --- Added by CI: permission_handler macros ---
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                defs = config.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] || ['$(inherited)']
                defs |= ['PERMISSION_NOTIFICATIONS=1']
                config.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] = defs
              end
            end
          end
          # --- End permission_handler macros ---
          RUBY
          fi
          echo "✅ permission_handler macros injected"

      # ── 9. CocoaPods CDN source ───────────────────────────────────────────
      - name: Force CocoaPods CDN source + disable stats
        script: |
          set -euo pipefail
          PODFILE="ios/Podfile"

          if ! grep -q "^source 'https://cdn.cocoapods.org/'" "$PODFILE"; then
            (echo "source 'https://cdn.cocoapods.org/'"; cat "$PODFILE") \
              > "$PODFILE.tmp" && mv "$PODFILE.tmp" "$PODFILE"
            echo "✅ Added CocoaPods CDN source"
          else
            echo "ℹ️  CDN source already present"
          fi

          if ! grep -q "ENV\['COCOAPODS_DISABLE_STATS'\] = 'true'" "$PODFILE"; then
            (echo "ENV['COCOAPODS_DISABLE_STATS'] = 'true'"; cat "$PODFILE") \
              > "$PODFILE.tmp" && mv "$PODFILE.tmp" "$PODFILE"
            echo "✅ CocoaPods stats disabled"
          else
            echo "ℹ️  Stats already disabled"
          fi

      # ── 10. pod install (CDN, with retry — no rm -rf to preserve cache) ───
      - name: Pod install via CDN
        script: |
          set -euo pipefail
          export LC_ALL=C.UTF-8
          export LANG=C.UTF-8

          cd ios
          echo "📦 CocoaPods version: $(pod --version)"

          retry() {
            local n=0 max=4 delay=10
            until "$@"; do
              n=$((n+1))
              [ $n -ge $max ] && { echo "❌ Failed after $n attempts: $*"; return 1; }
              echo "🔁 Retry $n/$max in ${delay}s…"
              sleep $delay
              delay=$((delay * 2))
            done
          }

          retry pod install --repo-update --verbose || {
            echo "⚠️  Retrying with explicit CDN source…"
            retry pod install \
              --repo-update \
              --sources='https://cdn.cocoapods.org/' \
              --verbose
          }

          echo "✅ pod install complete"
          cd ..

      # ── 11. iOS 14.0 enforcement — AFTER pod install ──────────────────────
      - name: Force-patch Pods project + xcconfigs to iOS 14.0
        script: |
          set -e
          PBX_PODS="ios/Pods/Pods.xcodeproj/project.pbxproj"
          if [ -f "$PBX_PODS" ]; then
            sed -i '' -E \
              's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]+;/IPHONEOS_DEPLOYMENT_TARGET = 14.0;/g' \
              "$PBX_PODS"
            echo "✅ Pods project.pbxproj patched"
          fi

          find ios/Pods -name "*.xcconfig" -print0 \
            | xargs -0 -I{} sed -i '' -E \
              's/^(IPHONEOS_DEPLOYMENT_TARGET *= *).*/\114.0/' \
              {} 2>/dev/null || true
          echo "✅ xcconfigs patched"

      # ── 12. Verify all targets on iOS 14.0+ ──────────────────────────────
      - name: Verify all targets are iOS 14.0+
        script: |
          set -e
          OFFENDER=0

          check() {
            local label="$1" file="$2"
            [ -f "$file" ] || return 0
            if grep -nE 'IPHONEOS_DEPLOYMENT_TARGET[[:space:]]*=[[:space:]]*1[0-3]\.' "$file"; then
              echo "❌ $label still has a target < 14.0"
              OFFENDER=1
            else
              echo "✅ $label OK"
            fi
          }

          check "Runner project.pbxproj" "ios/Runner.xcodeproj/project.pbxproj"
          check "Pods project.pbxproj"   "ios/Pods/Pods.xcodeproj/project.pbxproj"

          if grep -rnE '^IPHONEOS_DEPLOYMENT_TARGET[[:space:]]*=[[:space:]]*1[0-3]\.' \
               ios/Pods 2>/dev/null; then
            echo "❌ Some Pods xcconfigs still < 14.0"; OFFENDER=1
          else
            echo "✅ All Pods xcconfigs OK"
          fi

          [ "$OFFENDER" -eq 0 ] || { echo "❌ Deployment target check failed"; exit 1; }
          echo "✅ All targets confirmed at iOS 14.0+"

      # ── 13. Ensure Info.plist has required permission strings ─────────────
      - name: Ensure iOS permission usage strings in Info.plist
        script: |
          set -e
          PLIST="ios/Runner/Info.plist"

          add_str() {
            local key="$1" val="$2"
            /usr/libexec/PlistBuddy -c "Add :$key string $val"  "$PLIST" 2>/dev/null \
              || /usr/libexec/PlistBuddy -c "Set :$key $val"    "$PLIST" 2>/dev/null \
              || true
          }

          # Camera — scanning documents/answer sheets
          add_str NSCameraUsageDescription \
            "Allow camera access to scan documents and capture photos for exam processes."

          # Notifications — exam alerts and admin broadcasts
          add_str NSUserNotificationsUsageDescription \
            "Allow notifications to receive exam alerts and important announcements."

          # Local network — LAN-based offline exam delivery (core feature)
          add_str NSLocalNetworkUsageDescription \
            "Smashrite uses your local network to connect to the exam server for offline-mode assessments."
          add_str NSBonjourServices "_smashrite._tcp"

          echo "✅ Info.plist permission strings set"
          /usr/libexec/PlistBuddy -c "Print" "$PLIST" | grep -A1 "NS.*Usage"

      # ── 14. Regenerate iOS app icons (no alpha channel) ───────────────────
      - name: Regenerate iOS app icons (no alpha)
        script: |
          set -e

          # 0) Ensure source icon exists (1024x1024 opaque PNG)
          test -f assets/icons/ios/1024x1024.png || { echo "❌ assets/icons/ios/1024x1024.png missing"; exit 1; }

          # 1) Ensure iOS icon dirs exist so generator doesn't choke
          ICONSET_DIR="ios/Runner/Assets.xcassets/AppIcon.appiconset"
          mkdir -p "$ICONSET_DIR"
          [ -f "$ICONSET_DIR/Contents.json" ] || cat > "$ICONSET_DIR/Contents.json" <<'JSON'
          {
            "images" : [],
            "info" : { "version" : 1, "author" : "xcode" }
          }
          JSON

              # 2) Run generator ONLY for iOS to avoid the "No platform provided" warning
              #    (and ignore any non-zero due to benign warnings)
              dart run flutter_launcher_icons -p ios || true
              echo "✓ Successfully generated launcher icons (iOS)"

              # 3) Verify ios-marketing entry exists
              if ! grep -q '"idiom" *: *"ios-marketing"' "$ICONSET_DIR/Contents.json"; then
                echo "❌ ios-marketing (1024x1024) icon not listed"; exit 1
              fi

              # 4) Ensure no alpha in any generated PNGs
              if command -v sips >/dev/null 2>&1; then
                bad=0
                for p in "$ICONSET_DIR"/*.png; do
                  [ -f "$p" ] || continue
                  has_alpha=$(sips -g hasAlpha "$p" 2>/dev/null | awk '/hasAlpha:/ {print $2}')
                  if [ "$has_alpha" = "yes" ]; then
                    echo "❌ $p has alpha"
                    bad=1
                  fi
                done
                [ "$bad" -eq 0 ] && echo "✅ All iOS icons are opaque (no alpha)" || { echo "❌ Alpha detected"; exit 1; }
              else
                echo "ℹ️ 'sips' not available; skipping alpha check"
              fi

              # 5) Force success for this step if we reach here
              exit 0


      # ── 17. Build IPA (Flutter-native, uses Codemagic-installed signing) ──
      - name: Flutter build IPA
        script: |
          set -euo pipefail
          flutter build ipa --release
          echo "✅ IPA built"
          find build/ios/ipa -name "*.ipa" | xargs ls -lh

      # ── 18. Show build output tree ─────────────────────────────────────────
      - name: Show build output tree
        script: |
          echo "=== build/ios layout ==="
          find build/ios -maxdepth 5 \( -type d -o -type f \) | sort | sed 's/^/  /'
          echo "=== IPA ==="
          find build/ios -name "*.ipa" 2>/dev/null | xargs ls -lh 2>/dev/null \
            || echo "  (no IPA found — check step 17 logs)"

    # ── Artifacts ────────────────────────────────────────────────────────────
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/ipa/*.dSYM.zip
      - build_ios_verbose.log

    # ── Publishing ───────────────────────────────────────────────────────────
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false