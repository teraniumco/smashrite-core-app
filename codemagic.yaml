integrations:
  app_store_connect: Codemagic
workflows:
  ios-release:
    name: Smashrite Core – iOS (Auto-sign + TestFlight)
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - smashrite-vars   # ensure this group exists and contains the vars below
      vars:
        BUNDLE_ID: "com.smashrite.core.ios"

    scripts:

      # 1. Install dependencies
      - name: Get Flutter packages
        script: flutter pub get

      # 2. Clean build
      - name: Clean Flutter build
        script: flutter clean

      # 3. Build iOS (no codesign here — Codemagic handles it)
      - name: Build iOS release (no codesign)
        script: flutter build ios --release --no-codesign

      # 4. Enable Codemagic signing
      - name: Apply Codemagic code signing
        script: |
          xcode-project use-profiles

      # 5. Install CocoaPods
      - name: Install Pods
        script: |
          cd ios
          pod install

      # 6. Archive
      - name: Archive app
        script: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/build/Runner.xcarchive \
            archive

      # 7. Export IPA (Codemagic-managed signing ONLY)
      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath $CM_BUILD_DIR/build/Runner.xcarchive \
            -exportOptionsPlist ios/export_options.plist \
            -exportPath $CM_BUILD_DIR/build/ipa

    artifacts:
      - build/ios/ipa/*.ipa
      - build/Runner.xcarchive

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
