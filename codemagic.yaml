workflows:
  ios-release:
    name: Smashrite Core – iOS (Manual-sign + TestFlight)
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - smashrite-vars
      vars:
        BUNDLE_ID: "com.smashrite.core.ios"
        APPLE_TEAM_ID: "6N74MV2D96"
        COCOAPODS_DISABLE_STATS: "true"

    # ---------------------------------------------------------------------------
    # Required env vars in the "smashrite-vars" group on Codemagic dashboard:
    #
    #   APP_STORE_CONNECT_ISSUER_ID   → App Store Connect → Users & Access → API → Issuer ID
    #   APP_STORE_CONNECT_KEY_ID      → App Store Connect → Users & Access → API → Key ID
    #   APP_STORE_CONNECT_PRIVATE_KEY → Full contents of the downloaded .p8 file
    #   SIGNING_PRIVATE_KEY_PEM       → RSA private key used to create distribution cert
    #                                   Generate on Windows PowerShell (one-time):
    #                                     openssl genrsa -out cert_key.pem 2048
    #                                     Get-Content cert_key.pem
    #                                   Paste full output (including headers) into this var
    #   IOS_P12_PASSWORD              → Any strong password e.g. "Smashrite@2026!"
    # ---------------------------------------------------------------------------

    # triggering:
    #   events:
    #     - push
    #   branch_patterns:
    #     - pattern: main
    #       include: true

    scripts:

      # ── 1. Clean slate ──────────────────────────────────────────────────────
      - name: Flutter clean
        script: flutter clean

      # ── 2. Flutter dependencies ─────────────────────────────────────────────
      - name: Flutter deps
        script: flutter pub get

      # ── 3. Replace Bundle ID (iOS gets .ios suffix; Android keeps original) ─
      - name: Replace Bundle ID for iOS
        script: |
          set -e
          OLD_ID="com.smashrite.core"
          NEW_ID="com.smashrite.core.ios"
          echo "🔁 Replacing $OLD_ID → $NEW_ID"

          sed -i '' "s/$OLD_ID/$NEW_ID/g" \
            ios/Runner.xcodeproj/project.pbxproj

          sed -i '' "s/$OLD_ID/$NEW_ID/g" \
            ios/Runner/Info.plist 2>/dev/null || true

          grep -rl "$OLD_ID" ios \
            --include="*.plist" \
            --include="*.pbxproj" \
            --include="*.xcconfig" \
            | xargs -I{} sed -i '' "s/$OLD_ID/$NEW_ID/g" || true

          echo "✅ Bundle ID replaced"

      # ── 4. Initialize keychain ──────────────────────────────────────────────
      - name: Initialize keychain
        script: keychain initialize

      # ── 5. Verify all required secrets ─────────────────────────────────────
      - name: Verify required env vars
        script: |
          set -e
          fail() { echo "❌ $1 is missing or empty"; exit 1; }
          req()  { [ -n "$2" ] && echo "✅ $1 present" || fail "$1"; }
          req APP_STORE_CONNECT_ISSUER_ID   "$APP_STORE_CONNECT_ISSUER_ID"
          req APP_STORE_CONNECT_KEY_ID      "$APP_STORE_CONNECT_KEY_ID"
          req APP_STORE_CONNECT_PRIVATE_KEY "$APP_STORE_CONNECT_PRIVATE_KEY"
          req SIGNING_PRIVATE_KEY_PEM       "$SIGNING_PRIVATE_KEY_PEM"
          req IOS_P12_PASSWORD              "$IOS_P12_PASSWORD"
          echo "ℹ️  p12 password length: $(printf '%s' "$IOS_P12_PASSWORD" | wc -c | tr -d ' ') chars"

      # ── 6. Materialize ASC API key (.p8) ────────────────────────────────────
      - name: Materialize ASC API key (.p8)
        script: |
          set -e
          if printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" | grep -q '\\n'; then
            printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" | sed 's/\\n/\n/g' > AuthKey.p8
          else
            printf '%s\n' "$APP_STORE_CONNECT_PRIVATE_KEY" > AuthKey.p8
          fi
          echo "✅ AuthKey.p8 written"
          head -1 AuthKey.p8
          tail -1 AuthKey.p8

      # ── 7. Materialize certificate private key (.pem) ───────────────────────
      - name: Materialize certificate private key (.pem)
        script: |
          set -e
          printf '%s\n' "$SIGNING_PRIVATE_KEY_PEM" > cert_key.pem
          openssl rsa -in cert_key.pem -check -noout \
            && echo "✅ cert_key.pem is a valid RSA key" \
            || { echo "❌ cert_key.pem is invalid — check SIGNING_PRIVATE_KEY_PEM"; exit 1; }

      # ── 8. Clean stale certificates (avoid p12 import conflicts) ────────────
      - name: Clean stale certificates
        script: |
          set -e
          CERT_DIR="$HOME/Library/Developer/Xcode/UserData/Certificates"
          mkdir -p "$CERT_DIR"
          rm -f "$CERT_DIR"/*.p12 || true
          echo "✅ Certificates dir clean: $CERT_DIR"

      # ── 9. Fetch signing files (creates cert + provisioning profile) ─────────
      - name: Fetch signing files (App Store)
        script: |
          set -e
          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --issuer-id       "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id          "$APP_STORE_CONNECT_KEY_ID" \
            --private-key     "$(cat AuthKey.p8)" \
            --certificate-key "$(cat cert_key.pem)" \
            --p12-password    "$IOS_P12_PASSWORD"

          echo "📁 Xcode Certificates:"
          ls -la "$HOME/Library/Developer/Xcode/UserData/Certificates" || true
          echo "📁 Xcode Provisioning Profiles:"
          ls -la "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles" || true
          echo "📁 MobileDevice Certificates:"
          ls -la "$HOME/Library/MobileDevice/Certificates" || true
          echo "📁 MobileDevice Provisioning Profiles:"
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles" || true

      # ── 10. Validate p12 password ────────────────────────────────────────────
      - name: Validate p12 password
        script: |
          set -e
          CERT_DIR="$HOME/Library/Developer/Xcode/UserData/Certificates"
          P12="$(ls "$CERT_DIR"/*.p12 2>/dev/null | head -n1 || true)"
          [ -n "$P12" ] || { echo "❌ No .p12 found in $CERT_DIR — fetch-signing-files may have failed"; exit 1; }
          echo "🔐 Validating: $P12"
          openssl pkcs12 \
            -in "$P12" \
            -nokeys \
            -passin "pass:$IOS_P12_PASSWORD" \
            -info >/dev/null 2>&1 \
            && echo "✅ p12 password correct" \
            || { echo "❌ p12 password mismatch — check IOS_P12_PASSWORD"; exit 1; }

      # ── 11. Add certificate to keychain ─────────────────────────────────────
      - name: Add certificate to keychain
        script: |
          CERT_DIR="$HOME/Library/Developer/Xcode/UserData/Certificates"
          keychain add-certificates \
            --certificate "$CERT_DIR"/*.p12 \
            --certificate-password "$IOS_P12_PASSWORD"

      # ── 12. Apply provisioning profiles ─────────────────────────────────────
      - name: Apply provisioning profiles
        script: xcode-project use-profiles

      # ── 13. Force iPhone-only (no iPad) ─────────────────────────────────────
      - name: Force iPhone-only build
        script: |
          set -e
          PBX="ios/Runner.xcodeproj/project.pbxproj"
          sed -i '' 's/TARGETED_DEVICE_FAMILY = "1,2"/TARGETED_DEVICE_FAMILY = 1/g' "$PBX"
          sed -i '' 's/TARGETED_DEVICE_FAMILY = 1,2/TARGETED_DEVICE_FAMILY = 1/g'   "$PBX"
          echo "✅ Forced TARGETED_DEVICE_FAMILY = 1 (iPhone-only)"
          grep -n "TARGETED_DEVICE_FAMILY" "$PBX"

      - name: Remove iPad orientations from Info.plist
        script: |
          /usr/libexec/PlistBuddy -c \
            "Delete UISupportedInterfaceOrientations~ipad" \
            ios/Runner/Info.plist 2>/dev/null \
            && echo "✅ iPad orientations removed" \
            || echo "ℹ️  No iPad orientations key — skipping"

      # ── 14. iOS 14.0 enforcement — BEFORE pod install ───────────────────────
      - name: Enforce iOS 14.0 (pre-pod)
        script: |
          set -e
          cd ios

          if grep -qE "^platform :ios," Podfile; then
            sed -i.bak "s/^platform :ios, *['\"][0-9.]*['\"]/platform :ios, '14.0'/" Podfile
          else
            sed -i.bak "1s;^;platform :ios, '14.0'\n;" Podfile
          fi
          rm -f Podfile.bak
          cd ..

          PBX="ios/Runner.xcodeproj/project.pbxproj"
          sed -i '' -E \
            's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]+;/IPHONEOS_DEPLOYMENT_TARGET = 14.0;/g' \
            "$PBX"

          FWPLIST="ios/Flutter/AppFrameworkInfo.plist"
          if [ -f "$FWPLIST" ]; then
            /usr/libexec/PlistBuddy -c "Set :MinimumOSVersion 14.0" "$FWPLIST" 2>/dev/null \
              || /usr/libexec/PlistBuddy -c "Add :MinimumOSVersion string 14.0" "$FWPLIST"
          fi

          GEN="ios/Flutter/Generated.xcconfig"
          if [ -f "$GEN" ]; then
            if grep -q "^IPHONEOS_DEPLOYMENT_TARGET=" "$GEN"; then
              sed -i '' -E \
                's/^IPHONEOS_DEPLOYMENT_TARGET=.*/IPHONEOS_DEPLOYMENT_TARGET=14.0/' "$GEN"
            else
              printf "\nIPHONEOS_DEPLOYMENT_TARGET=14.0\n" >> "$GEN"
            fi
          fi

          echo "✅ iOS 14.0 enforced (pre-pod)"

      # ── 15. permission_handler macros in Podfile ─────────────────────────────
      - name: Inject permission_handler macros into Podfile
        script: |
          set -euo pipefail
          PODFILE="ios/Podfile"
          [ -f "$PODFILE" ] || { echo "❌ Podfile not found"; exit 1; }

          if grep -qE "^[[:space:]]*post_install do \|installer\|" "$PODFILE"; then
            echo "🧩 post_install found → injecting macros inside it"
            awk '
            BEGIN { inserted=0 }
            {
              print $0
              if (!inserted && $0 ~ /^[[:space:]]*post_install do \|installer\|/) {
                print "  # --- permission_handler macros (injected by CI) ---"
                print "  installer.pods_project.targets.each do |target|"
                print "    target.build_configurations.each do |config|"
                print "      defs = config.build_settings[\"GCC_PREPROCESSOR_DEFINITIONS\"] || [\"$(inherited)\"]"
                print "      defs |= [\"PERMISSION_NOTIFICATIONS=1\"]"
                print "      config.build_settings[\"GCC_PREPROCESSOR_DEFINITIONS\"] = defs"
                print "    end"
                print "  end"
                print "  # --- end permission_handler macros ---"
                inserted=1
              }
            }' "$PODFILE" > "$PODFILE.tmp" && mv "$PODFILE.tmp" "$PODFILE"
          else
            echo "➕ No post_install found → appending one"
            cat >> "$PODFILE" <<'RUBY'

          # --- Added by CI: permission_handler macros ---
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                defs = config.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] || ['$(inherited)']
                defs |= ['PERMISSION_NOTIFICATIONS=1']
                config.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] = defs
              end
            end
          end
          # --- End permission_handler macros ---
          RUBY
          fi
          echo "✅ permission_handler macros injected"

      # ── 16. CocoaPods CDN source ─────────────────────────────────────────────
      - name: Force CocoaPods CDN source + disable stats
        script: |
          set -euo pipefail
          PODFILE="ios/Podfile"

          if ! grep -q "^source 'https://cdn.cocoapods.org/'" "$PODFILE"; then
            (echo "source 'https://cdn.cocoapods.org/'"; cat "$PODFILE") \
              > "$PODFILE.tmp" && mv "$PODFILE.tmp" "$PODFILE"
            echo "✅ CocoaPods CDN source added"
          else
            echo "ℹ️  CDN source already present"
          fi

          if ! grep -q "ENV\['COCOAPODS_DISABLE_STATS'\] = 'true'" "$PODFILE"; then
            (echo "ENV['COCOAPODS_DISABLE_STATS'] = 'true'"; cat "$PODFILE") \
              > "$PODFILE.tmp" && mv "$PODFILE.tmp" "$PODFILE"
            echo "✅ CocoaPods stats disabled"
          else
            echo "ℹ️  Stats already disabled"
          fi

      # ── 17. pod install (CDN, with retry — NO rm -rf) ───────────────────────
      - name: Pod install via CDN
        script: |
          set -euo pipefail
          export LC_ALL=C.UTF-8
          export LANG=C.UTF-8

          cd ios
          echo "📦 CocoaPods version: $(pod --version)"

          retry() {
            local n=0 max=4 delay=10
            until "$@"; do
              n=$((n+1))
              [ $n -ge $max ] && { echo "❌ Failed after $n attempts: $*"; return 1; }
              echo "🔁 Retry $n/$max in ${delay}s…"
              sleep $delay
              delay=$((delay * 2))
            done
          }

          retry pod install --repo-update --verbose || {
            echo "⚠️  Retrying with explicit CDN source…"
            retry pod install \
              --repo-update \
              --sources='https://cdn.cocoapods.org/' \
              --verbose
          }

          echo "✅ pod install complete"
          cd ..

      # ── 18. iOS 14.0 enforcement — AFTER pod install ────────────────────────
      - name: Force-patch Pods project + xcconfigs to iOS 14.0
        script: |
          set -e
          PBX_PODS="ios/Pods/Pods.xcodeproj/project.pbxproj"
          if [ -f "$PBX_PODS" ]; then
            sed -i '' -E \
              's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]+;/IPHONEOS_DEPLOYMENT_TARGET = 14.0;/g' \
              "$PBX_PODS"
            echo "✅ Pods project.pbxproj patched"
          fi
          find ios/Pods -name "*.xcconfig" -print0 \
            | xargs -0 -I{} sed -i '' -E \
              's/^(IPHONEOS_DEPLOYMENT_TARGET *= *).*/\114.0/' \
              {} 2>/dev/null || true
          echo "✅ Pods xcconfigs patched"

      # ── 19. Verify all targets are iOS 14.0+ ────────────────────────────────
      - name: Verify all targets are iOS 14.0+
        script: |
          set -e
          OFFENDER=0

          check() {
            local label="$1" file="$2"
            [ -f "$file" ] || return 0
            if grep -nE 'IPHONEOS_DEPLOYMENT_TARGET[[:space:]]*=[[:space:]]*1[0-3]\.' "$file"; then
              echo "❌ $label still has a target < 14.0"; OFFENDER=1
            else
              echo "✅ $label OK"
            fi
          }

          check "Runner project.pbxproj" "ios/Runner.xcodeproj/project.pbxproj"
          check "Pods project.pbxproj"   "ios/Pods/Pods.xcodeproj/project.pbxproj"

          if grep -rnE '^IPHONEOS_DEPLOYMENT_TARGET[[:space:]]*=[[:space:]]*1[0-3]\.' \
               ios/Pods 2>/dev/null; then
            echo "❌ Some Pods xcconfigs still < 14.0"; OFFENDER=1
          else
            echo "✅ All Pods xcconfigs OK"
          fi

          [ "$OFFENDER" -eq 0 ] \
            || { echo "❌ Deployment target check failed"; exit 1; }
          echo "✅ All targets confirmed at iOS 14.0+"

      # ── 20. Info.plist permission strings ────────────────────────────────────
      - name: Ensure iOS permission usage strings in Info.plist
        script: |
          set -e
          PLIST="ios/Runner/Info.plist"

          add_str() {
            /usr/libexec/PlistBuddy -c "Add :$1 string $2"  "$PLIST" 2>/dev/null \
              || /usr/libexec/PlistBuddy -c "Set :$1 $2"    "$PLIST" 2>/dev/null \
              || true
          }

          add_str NSCameraUsageDescription \
            "Allow camera access to scan documents and capture photos for exam processes."
          add_str NSUserNotificationsUsageDescription \
            "Allow notifications to receive exam alerts and important announcements."
          add_str NSLocalNetworkUsageDescription \
            "Smashrite uses your local network to connect to the exam server for offline-mode assessments."
          add_str NSBonjourServices "_smashrite._tcp"

          echo "✅ Info.plist permission strings set"
          /usr/libexec/PlistBuddy -c "Print" "$PLIST" | grep -A1 "NS.*Usage" || true

      # ── 21. Regenerate iOS app icons (no alpha) ──────────────────────────────
      - name: Regenerate iOS app icons
        script: |
          set -e
          ICON_SRC="assets/icons/ios/1024x1024.png"
          ICONSET_DIR="ios/Runner/Assets.xcassets/AppIcon.appiconset"

          [ -f "$ICON_SRC" ] \
            || { echo "❌ $ICON_SRC missing — add a 1024×1024 opaque PNG"; exit 1; }

          mkdir -p "$ICONSET_DIR"
          [ -f "$ICONSET_DIR/Contents.json" ] || cat > "$ICONSET_DIR/Contents.json" <<'JSON'
          {
            "images" : [],
            "info" : { "version" : 1, "author" : "xcode" }
          }
          JSON

          # Generate iOS icons — fail loudly on real errors
          dart run flutter_launcher_icons -p ios
          echo "✅ Icons generated"

          # ios-marketing (1024×1024) is mandatory for App Store
          grep -q '"idiom".*"ios-marketing"' "$ICONSET_DIR/Contents.json" \
            || { echo "❌ ios-marketing (1024×1024) entry missing"; exit 1; }

          # Apple rejects icons with alpha channel
          if command -v sips >/dev/null 2>&1; then
            BAD=0
            for p in "$ICONSET_DIR"/*.png; do
              [ -f "$p" ] || continue
              ALPHA=$(sips -g hasAlpha "$p" 2>/dev/null | awk '/hasAlpha:/ {print $2}')
              [ "$ALPHA" = "yes" ] && { echo "❌ Alpha detected: $p"; BAD=1; }
            done
            [ "$BAD" -eq 0 ] \
              && echo "✅ All icons are opaque (no alpha)" \
              || { echo "❌ Remove alpha from source PNG and retry"; exit 1; }
          else
            echo "ℹ️  sips not available — skipping alpha check"
          fi

      # ── 22. Write ExportOptions.plist (detects installed profile name) ────────
      - name: Write ExportOptions.plist
        script: |
          set -e
          mkdir -p build/ios/ipa

          PROFILE_NAME=""
          echo "🔎 Scanning installed provisioning profiles…"

          for f in "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles/"*.mobileprovision; do
            [ -f "$f" ] || continue
            TMP="$(mktemp)"
            /usr/bin/security cms -D -i "$f" > "$TMP" 2>/dev/null \
              || { rm -f "$TMP"; continue; }

            BID="$(/usr/libexec/PlistBuddy \
                    -c 'Print Entitlements:application-identifier' "$TMP" 2>/dev/null \
                    | sed 's/^[^.]*\.//' || true)"
            TEAM="$(/usr/libexec/PlistBuddy \
                     -c 'Print TeamIdentifier:0' "$TMP" 2>/dev/null || true)"
            NAME="$(/usr/libexec/PlistBuddy \
                     -c 'Print Name' "$TMP" 2>/dev/null || true)"
            /usr/libexec/PlistBuddy -c 'Print ProvisionedDevices' "$TMP" \
              >/dev/null 2>&1 && HAS_DEVICES=1 || HAS_DEVICES=0
            GTL="$(/usr/libexec/PlistBuddy \
                    -c 'Print Entitlements:get-task-allow' "$TMP" 2>/dev/null \
                    || echo false)"
            rm -f "$TMP"

            echo "  → BID=$BID | TEAM=$TEAM | DEVICES=$HAS_DEVICES | GTL=$GTL | NAME=$NAME"

            if [ "$BID" = "$BUNDLE_ID" ] \
                && [ "$TEAM" = "$APPLE_TEAM_ID" ] \
                && [ "$HAS_DEVICES" -eq 0 ] \
                && [ "$GTL" = "false" ]; then
              PROFILE_NAME="$NAME"
              echo "✅ Matched profile: $PROFILE_NAME"
              break
            fi
          done

          if [ -z "$PROFILE_NAME" ]; then
            echo "❌ No matching App Store profile found for $BUNDLE_ID ($APPLE_TEAM_ID)"
            echo "ℹ️  All profiles listed above — check BID/TEAM/DEVICES/GTL values"
            exit 1
          fi

          EXPORT_PLIST="build/ios/ipa/ExportOptions.plist"
          cat > "$EXPORT_PLIST" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

          echo "📝 ExportOptions.plist:"
          cat "$EXPORT_PLIST"

      # ── 23. Flutter build IPA ────────────────────────────────────────────────
      - name: Flutter build IPA
        script: |
          set -euo pipefail
          export NSUnbufferedIO=YES
          LOG="build_ios_verbose.log"
          BUILD_FAILED=0

          flutter build ipa --release \
            --export-options-plist=build/ios/ipa/ExportOptions.plist \
            -v 2>&1 | tee "$LOG" || BUILD_FAILED=1

          if [ "$BUILD_FAILED" -ne 0 ]; then
            echo "❌ flutter build ipa failed. Extracting errors…"

            XCRESULT="$(awk \
              '/Result bundle written to path:/ {getline; gsub(/^ *|\r$/,""); print; exit}' \
              "$LOG" || true)"

            if [ -n "${XCRESULT:-}" ] && [ -d "$XCRESULT" ]; then
              echo "📦 xcresult: $XCRESULT"
              xcrun xcresulttool get --path "$XCRESULT" --format json \
                > xcresult.json 2>/dev/null || true
              python3 - <<'PY'
          import json, sys
          try:
              d = json.load(open('xcresult.json'))
          except Exception as e:
              print("Could not parse xcresult.json:", e); sys.exit(0)
          def walk(o):
              if isinstance(o, dict):
                  t = o.get('_type', {}).get('_name')
                  if t == 'IssueSummary':
                      sev = o.get('issueType',  {}).get('_value', 'ISSUE')
                      msg = o.get('message',     {}).get('text',  '').strip()
                      loc = o.get('documentLocationInCreatingWorkspace',
                                  {}).get('urlString', '')
                      if msg:
                          print(f"[{sev}] {msg}")
                          if loc: print(f"  → {loc}")
                  for v in o.values(): walk(v)
              elif isinstance(o, list):
                  for v in o: walk(v)
          walk(d)
          PY
            else
              echo "ℹ️  No xcresult found. Last 200 lines of build log:"
              tail -n 200 "$LOG"
              echo "--- Common error patterns ---"
              grep -iE 'error:|exception|No file or variants|AssetNotFound' "$LOG" \
                | tail -n 50 || true
            fi
            exit 1
          fi

          echo "✅ flutter build ipa succeeded"

      # ── 24. Confirm IPA exists ───────────────────────────────────────────────
      - name: Show build output tree
        script: |
          echo "=== build/ios layout ==="
          find build/ios -maxdepth 5 \( -type d -o -type f \) | sort | sed 's/^/  /'
          echo "=== IPA ==="
          find build/ios -name "*.ipa" 2>/dev/null | xargs ls -lh 2>/dev/null \
            || echo "  ❌ No IPA found — check step 23 logs"

    # ── Artifacts ────────────────────────────────────────────────────────────
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/ipa/*.dSYM.zip
      - build_ios_verbose.log      # retained on failure for diagnosis

    # ── Publishing ───────────────────────────────────────────────────────────
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false