workflows:
  ios-release:
    name: Smashrite – iOS (Auto-sign + TestFlight)
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - smashrite-vars   # ensure this group exists and contains the vars below
      vars:
        BUNDLE_ID: "com.smashrite.core"
        APPLE_TEAM_ID: "6N74MV2D96"  # your Apple Developer Team ID
        COCOAPODS_DISABLE_STATS: "true"
    scripts:
      - name: Flutter deps
        script: flutter pub get

      - name: Initialize keychain
        script: keychain initialize

      - name: Verify required env vars
        script: |
          set -e
          fail() { echo "❌ $1"; exit 1; }
          req() { [ -n "$2" ] || fail "$1 is missing"; echo "✅ $1 present"; }
          req APP_STORE_CONNECT_ISSUER_ID "$APP_STORE_CONNECT_ISSUER_ID"
          req APP_STORE_CONNECT_KEY_ID "$APP_STORE_CONNECT_KEY_ID"
          req APP_STORE_CONNECT_PRIVATE_KEY "$APP_STORE_CONNECT_PRIVATE_KEY"
          req SIGNING_PRIVATE_KEY_PEM "$SIGNING_PRIVATE_KEY_PEM"
          req IOS_P12_PASSWORD "$IOS_P12_PASSWORD"
          echo "ℹ️ p12 password length: $(printf "%s" "$IOS_P12_PASSWORD" | wc -c)"

      - name: Materialize ASC API key (.p8)
        script: |
          set -e
          if printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" | grep -q '\\n'; then
            printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" | sed 's/\\n/\n/g' > AuthKey.p8
          else
            printf '%s\n' "$APP_STORE_CONNECT_PRIVATE_KEY" > AuthKey.p8
          fi
          head -1 AuthKey.p8 || true
          tail -1 AuthKey.p8 || true

      - name: Prepare certificate private key (PEM)
        script: |
          set -e
          printf '%s\n' "$SIGNING_PRIVATE_KEY_PEM" > cert_key.pem
          openssl rsa -in cert_key.pem -check -noout

      - name: Clean certificates dir (avoid stale p12 conflicts)
        script: |
          set -e
          CERT_DIR="$HOME/Library/MobileDevice/Certificates"
          mkdir -p "$CERT_DIR"
          rm -f "$CERT_DIR"/*.p12 || true
          echo "✅ Certificates dir ready: $CERT_DIR"

      - name: Fetch signing files (App Store) → cert + profiles
        script: |
          set -e
          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --private-key "$(cat AuthKey.p8)" \
            --certificate-key "$(cat cert_key.pem)" \
            --p12-password "$IOS_P12_PASSWORD"
          echo "📁 After fetch:"
          ls -la "$HOME/Library/MobileDevice/Certificates" || true
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles" || true

      - name: Validate p12 password
        script: |
          set -e
          CERT_DIR="$HOME/Library/MobileDevice/Certificates"
          P12="$(ls "$CERT_DIR"/*.p12 | head -n1 || true)"
          if [ -z "$P12" ]; then echo "❌ No .p12 found"; exit 1; fi
          echo "🔐 Checking $P12"
          openssl pkcs12 -in "$P12" -nokeys -passin pass:"$IOS_P12_PASSWORD" -info >/dev/null 2>&1 \
            && echo "✅ p12 password OK" || { echo "❌ Wrong p12 password"; exit 1; }

      - name: Add certificates to keychain
        script: keychain add-certificates --certificate-password "$IOS_P12_PASSWORD"

      - name: Use the fetched provisioning profiles
        script: xcode-project use-profiles

      - name: Force iPhone-only build
        script: |
          echo "🔧 Forcing TARGETED_DEVICE_FAMILY = 1 (iPhone-only)..."
          sed -i '' 's/TARGETED_DEVICE_FAMILY = "1,2"/TARGETED_DEVICE_FAMILY = 1/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/TARGETED_DEVICE_FAMILY = 1,2/TARGETED_DEVICE_FAMILY = 1/g' ios/Runner.xcodeproj/project.pbxproj
          grep -n "TARGETED_DEVICE_FAMILY" ios/Runner.xcodeproj/project.pbxproj

      - name: Remove iPad orientations
        script: |
          echo "🧹 Cleaning iPad orientations..."
          /usr/libexec/PlistBuddy -c "Delete UISupportedInterfaceOrientations~ipad" ios/Runner/Info.plist || true

      # ---- iOS 14.0 normalization BEFORE pod install ----
      - name: Enforce iOS 14.0 (Podfile, Runner, Flutter plist, Generated.xcconfig)
        script: |
          set -e

          # --- Podfile: platform + post_install hook ---
          cd ios
          if ! grep -q '^platform :ios' Podfile; then
            sed -i.bak '1s;^;platform :ios, "14.0"\n;' Podfile
          else
            sed -i.bak 's/platform :ios, *["'\''][0-9.]\+["'\'']/platform :ios, "14.0"/' Podfile
          fi
            cd ..

          # --- Runner project: bump to 14.0 ---
          PBX_RUNNER="ios/Runner.xcodeproj/project.pbxproj"
          sed -i '' -E 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]+;/IPHONEOS_DEPLOYMENT_TARGET = 14.0;/g' "$PBX_RUNNER" || true
          sed -i    -E 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]+;/IPHONEOS_DEPLOYMENT_TARGET = 14.0;/g' "$PBX_RUNNER" || true

          # --- Flutter framework: MinimumOSVersion 14.0 ---
          PLIST="ios/Flutter/AppFrameworkInfo.plist"
          if [ -f "$PLIST" ]; then
            /usr/libexec/PlistBuddy -c "Set :MinimumOSVersion 14.0" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Add :MinimumOSVersion string 14.0" "$PLIST"
          fi

          # --- Flutter Generated.xcconfig can pin a lower min ---
          GEN="ios/Flutter/Generated.xcconfig"
          if [ -f "$GEN" ]; then
            if grep -q '^IPHONEOS_DEPLOYMENT_TARGET=' "$GEN"; then
              sed -i '' -E 's/^IPHONEOS_DEPLOYMENT_TARGET=.*/IPHONEOS_DEPLOYMENT_TARGET=14.0/' "$GEN" || true
              sed -i    -E 's/^IPHONEOS_DEPLOYMENT_TARGET=.*/IPHONEOS_DEPLOYMENT_TARGET=14.0/' "$GEN" || true
            else
              printf "\nIPHONEOS_DEPLOYMENT_TARGET=14.0\n" >> "$GEN"
            fi
          fi

      - name: Enable permission_handler iOS macros in Podfile (merge-safe)
        script: |
          set -euo pipefail
          PODFILE="ios/Podfile"

          if [ ! -f "$PODFILE" ]; then
            echo "❌ $PODFILE not found. Run from Flutter project root."
            exit 1
          fi

          echo "🔧 Ensure iOS platform 14.0"
          if grep -qE "^platform :ios," "$PODFILE"; then
            sed -i.bak "s/^platform :ios, *['\"][0-9.]*['\"]/platform :ios, '14.0'/g" "$PODFILE" || true
          else
            (echo "platform :ios, '14.0'"; cat "$PODFILE") > "$PODFILE.tmp" && mv "$PODFILE.tmp" "$PODFILE"
          fi

          echo "🔎 Checking for existing post_install hook..."
          if grep -qE "^[[:space:]]*post_install do \|installer\|" "$PODFILE"; then
            echo "🧩 post_install exists → injecting macros inside it"

            # Inject a safe, idempotent snippet immediately after the post_install line.
            # It union-adds the permission macros so duplicates won't accumulate.
            awk '
            BEGIN{inserted=0}
            {
              print $0
              if (!inserted && $0 ~ /^[[:space:]]*post_install do \|installer\|/) {
                print "  # --- permission_handler macros (injected by CI) ---"
                print "  installer.pods_project.targets.each do |target|"
                print "    target.build_configurations.each do |config|"
                print "      defs = config.build_settings[\"GCC_PREPROCESSOR_DEFINITIONS\"] || [\"$(inherited)\"]"
                print "      defs |= ["
                print "        \"PERMISSION_LOCATION=1\","
                print "        \"PERMISSION_NOTIFICATIONS=1\""
                # print "        \"PERMISSION_PHOTOS=1\","
                # print "        \"PERMISSION_CAMERA=1\""
                print "      ]"
                print "      config.build_settings[\"GCC_PREPROCESSOR_DEFINITIONS\"] = defs"
                print "    end"
                print "  end"
                print "  # --- end permission_handler macros ---"
                inserted=1
              }
            }' "$PODFILE" > "$PODFILE.tmp" && mv "$PODFILE.tmp" "$PODFILE"

          else
            echo "➕ No post_install found → adding one with macros"
            cat >> "$PODFILE" <<'POD'

          # --- Added by CI: permission_handler macros ---
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                defs = config.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] || ['$(inherited)']
                defs |= [
                  'PERMISSION_LOCATION=1',
                  'PERMISSION_NOTIFICATIONS=1'
                  # 'PERMISSION_PHOTOS=1',
                  # 'PERMISSION_CAMERA=1'
                ]
                config.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] = defs
              end
            end
          end
          # --- End permission_handler macros ---
          POD
              fi

      - name: Force CocoaPods CDN + disable stats (Podfile patch)
        script: |
          set -euo pipefail
          PODFILE="ios/Podfile"
          [ -f "$PODFILE" ] || { echo "❌ $PODFILE not found"; exit 1; }

          # Ensure CDN source at the very top (only once)
          if ! grep -q "^source 'https://cdn.cocoapods.org/'" "$PODFILE"; then
            (echo "source 'https://cdn.cocoapods.org/'"; cat "$PODFILE") > "$PODFILE.tmp" && mv "$PODFILE.tmp" "$PODFILE"
            echo "✅ Added CocoaPods CDN source to Podfile"
          else
            echo "ℹ️ CDN source already present"
          fi

          # Disable CocoaPods stats to reduce outbound calls
          if ! grep -q "ENV\['COCOAPODS_DISABLE_STATS'\] = 'true'" "$PODFILE"; then
            (echo "ENV['COCOAPODS_DISABLE_STATS'] = 'true'"; cat "$PODFILE") > "$PODFILE.tmp" && mv "$PODFILE.tmp" "$PODFILE"
            echo "✅ Disabled CocoaPods stats in Podfile"
          else
            echo "ℹ️ Stats already disabled"
          fi

      - name: Set Google Maps iOS API key from .env into Info.plist
        script: |
          set -euo pipefail
          PLIST="ios/Runner/Info.plist"

          # Pick a value from .env (prefer GOOGLE_API_KEY, else GOOGLE_API_KEY)
          if [ -f ".env" ]; then
            IOS_MAPS_KEY=$(grep -E '^(GOOGLE_API_KEY)=' .env | head -n1 | cut -d= -f2-)
          fi

          # Fallback to Codemagic env var if you prefer to store secrets in the UI
          IOS_MAPS_KEY="${IOS_MAPS_KEY:-${GOOGLE_API_KEY:-}}"

          if [ -z "${IOS_MAPS_KEY:-}" ]; then
            echo "❌ No iOS Maps API key found (GOOGLE_API_KEY / GOOGLE_API_KEY)."
            exit 1
          fi

          # Write/overwrite GMSApiKey in Info.plist
          /usr/libexec/PlistBuddy -c "Delete :GMSApiKey" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :GMSApiKey string $IOS_MAPS_KEY" "$PLIST"

          echo "✅ Wrote GMSApiKey to $PLIST"



      - name: Pod install via CDN (retry, no `pod repo update`)
        script: |
          set -euo pipefail
          export LC_ALL=C.UTF-8
          export LANG=C.UTF-8

          cd ios

          # Start from a clean state if you want, but keep this optional
          rm -rf Pods Podfile.lock

          echo "🔧 CocoaPods env"
          pod --version
          pod repo list || true

          # Retry helper
          retry() {
            local n=0 max=5 delay=8
            until "$@"; do
              n=$((n+1))
              if [ $n -ge $max ]; then
                echo "❌ Command failed after $n attempts: $*"
                return 1
              fi
              echo "🔁 Retry $n/$max in ${delay}s… ($*)"
              sleep $delay
              delay=$((delay*2))
            done
          }

          # Use CDN; avoid `pod repo update` entirely
          # --repo-update updates the CDN index only; much lighter than git repo update
          set -o pipefail
          retry pod install --repo-update --verbose | sed -E 's/(.*cloudflare.*)/[CF] \1/g' || {
            echo "⚠️ First attempt failed. Trying again with explicit sources…"
            retry pod install --repo-update --sources='https://cdn.cocoapods.org/' --verbose
          }

          echo "✅ pod install via CDN completed"
          cd ..

      # ---- iOS 14.0 normalization AFTER pod install (Pods project + xcconfigs) ----
      - name: Force-patch Pods project + xcconfigs to iOS 14.0
        script: |
          set -e
          PBX_PODS="ios/Pods/Pods.xcodeproj/project.pbxproj"
          sed -i '' -E 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]+;/IPHONEOS_DEPLOYMENT_TARGET = 14.0;/g' "$PBX_PODS" || true
          sed -i    -E 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]+;/IPHONEOS_DEPLOYMENT_TARGET = 14.0;/g' "$PBX_PODS" || true
          find ios/Pods -name "*.xcconfig" -print0 | xargs -0 sed -i '' -E 's/^(IPHONEOS_DEPLOYMENT_TARGET *= *).*/\114.0/' 2>/dev/null || true
          find ios/Pods -name "*.xcconfig" -print0 | xargs -0 sed -i    -E 's/^(IPHONEOS_DEPLOYMENT_TARGET *= *).*/\114.0/' 2>/dev/null || true
          echo "✅ Forced Pods project & xcconfigs to 14.0"

      - name: Verify all targets are iOS 14.0+
        script: |
          set -e
          OFF=0
          echo "🔎 Runner project.pbxproj:"
          if grep -R -nE 'IPHONEOS_DEPLOYMENT_TARGET[[:space:]]*=[[:space:]]*1[0-3]\.' ios/Runner.xcodeproj/project.pbxproj; then OFF=1; fi
          echo "🔎 Pods project.pbxproj:"
          if grep -R -nE 'IPHONEOS_DEPLOYMENT_TARGET[[:space:]]*=[[:space:]]*1[0-3]\.' ios/Pods/Pods.xcodeproj/project.pbxproj; then OFF=1; fi
          echo "🔎 Pods *.xcconfig:"
          if grep -R -nE '^IPHONEOS_DEPLOYMENT_TARGET[[:space:]]*=[[:space:]]*1[0-3]\.' ios/Pods; then OFF=1; fi
          if [ "$OFF" -eq 1 ]; then
            echo "❌ Some targets still < 14.0 (see lines above)"; exit 1
          fi
          echo "✅ All targets set to iOS 14.0"

      - name: Ensure iOS Info.plist has required permissions
        script: |
          set -e
          PLIST="ios/Runner/Info.plist"
          add_str() { /usr/libexec/PlistBuddy -c "Add :$1 string $2" "$PLIST" 2>/dev/null || /usr/libexec/PlistBuddy -c "Set :$1 $2" "$PLIST" 2>/dev/null || true; }
          add_bool() { /usr/libexec/PlistBuddy -c "Add :$1 $2" "$PLIST" 2>/dev/null || true; }

          add_str NSLocationWhenInUseUsageDescription "We use your location to show nearby drivers, pickups, and estimate arrival times."
          add_str NSLocationAlwaysAndWhenInUseUsageDescription "We use your location to enable accurate tracking and notifications even when the app is not active."
          add_str NSCameraUsageDescription "Allow camera to take photos of rides and documents."
          add_str NSMicrophoneUsageDescription "Allow microphone for video recording."
          add_str NSPhotoLibraryUsageDescription "Allow photo library access to choose images."
          add_str NSPhotoLibraryAddUsageDescription "Allow saving images to your library."
          
          /usr/libexec/PlistBuddy -c "Print" "$PLIST" | sed -n '1,120p'


      - name: Create .env for release
        script: |
          set -e

          # 1) Make sure required secrets exist
          req() { [ -n "$2" ] || { echo "❌ $1 is missing"; exit 1; }; echo "✅ $1 present"; }
          req GOOGLE_API_KEY "$GOOGLE_API_KEY"
          req X_WF_SECURITY_KEY "$X_WF_SECURITY_KEY"
          req NUBAN_BEARER_TOKEN "$NUBAN_BEARER_TOKEN"
          req WEB_SOCKET_KEY "$WEB_SOCKET_KEY"
          req X_ESSE_MEDIA_SECURITY_KEY "$X_ESSE_MEDIA_SECURITY_KEY"

          # 2) Write .env with EXPANDED values (note: unquoted EOF)
          cat > .env <<EOF
          GOOGLE_API_KEY=${GOOGLE_API_KEY}
          X_WF_SECURITY_KEY=${X_WF_SECURITY_KEY}
          NUBAN_BEARER_TOKEN=${NUBAN_BEARER_TOKEN}
          WEB_SOCKET_KEY=${WEB_SOCKET_KEY}
          X_ESSE_MEDIA_SECURITY_KEY=${X_ESSE_MEDIA_SECURITY_KEY}
          EOF

          echo "✅ Wrote $(pwd)/.env"
          echo "🔎 Keys present:"; cut -d= -f1 .env


      - name: Regenerate iOS app icons (no alpha)
        script: |
          set -e

          # 0) Ensure source icon exists (1024x1024 opaque PNG)
          test -f assets/icons/ios/1024x1024.png || { echo "❌ assets/icons/ios/1024x1024.png missing"; exit 1; }

          # 1) Ensure iOS icon dirs exist so generator doesn't choke
          ICONSET_DIR="ios/Runner/Assets.xcassets/AppIcon.appiconset"
          mkdir -p "$ICONSET_DIR"
          [ -f "$ICONSET_DIR/Contents.json" ] || cat > "$ICONSET_DIR/Contents.json" <<'JSON'
          {
            "images" : [],
            "info" : { "version" : 1, "author" : "xcode" }
          }
          JSON

              # 2) Run generator ONLY for iOS to avoid the "No platform provided" warning
              #    (and ignore any non-zero due to benign warnings)
              dart run flutter_launcher_icons -p ios || true
              echo "✓ Successfully generated launcher icons (iOS)"

              # 3) Verify ios-marketing entry exists
              if ! grep -q '"idiom" *: *"ios-marketing"' "$ICONSET_DIR/Contents.json"; then
                echo "❌ ios-marketing (1024x1024) icon not listed"; exit 1
              fi

              # 4) Ensure no alpha in any generated PNGs
              if command -v sips >/dev/null 2>&1; then
                bad=0
                for p in "$ICONSET_DIR"/*.png; do
                  [ -f "$p" ] || continue
                  has_alpha=$(sips -g hasAlpha "$p" 2>/dev/null | awk '/hasAlpha:/ {print $2}')
                  if [ "$has_alpha" = "yes" ]; then
                    echo "❌ $p has alpha"
                    bad=1
                  fi
                done
                [ "$bad" -eq 0 ] && echo "✅ All iOS icons are opaque (no alpha)" || { echo "❌ Alpha detected"; exit 1; }
              else
                echo "ℹ️ 'sips' not available; skipping alpha check"
              fi

              # 5) Force success for this step if we reach here
              exit 0


      - name: Build iOS (Flutter compile only, with xcresult dump)
        script: |
          set -euo pipefail
          export NSUnbufferedIO=YES

          flutter clean
          flutter pub get

          LOG=build_ios_verbose.log
          BUILD_FAILED=0
          flutter build ios --release --no-codesign -v 2>&1 | tee "$LOG" || BUILD_FAILED=1

          # Try to extract xcresult path
          XCRESULT="$(awk '/Result bundle written to path:/ {getline; gsub(/^ *|\r$/,""); print; exit}' "$LOG" || true)"

          if [ "$BUILD_FAILED" -ne 0 ]; then
            echo "❌ Flutter iOS build failed."
            if [ -n "${XCRESULT:-}" ] && [ -d "$XCRESULT" ]; then
              echo "📦 xcresult: $XCRESULT"
              xcrun xcresulttool get --path "$XCRESULT" --format json > xcresult.json || true
              python3 - <<'PY'
          import json, sys
          try:
              d=json.load(open('xcresult.json'))
          except Exception as e:
              print("Could not parse xcresult.json:", e); sys.exit(0)
          def walk(o):
              if isinstance(o, dict):
                  t=o.get('_type',{}).get('_name')
                  if t=='IssueSummary':
                      sev=o.get('issueType',{}).get('_value','ISSUE')
                      msg=o.get('message',{}).get('text','').strip()
                      loc=o.get('documentLocationInCreatingWorkspace',{}).get('urlString','')
                      if msg:
                          print(f"[{sev}] {msg}")
                          if loc: print(f"  → {loc}")
                  if 'errors' in o and isinstance(o['errors'], list):
                      for e in o['errors']:
                          txt=e.get('message',{}).get('text')
                          if txt: print(f"[ERROR] {txt}")
                  for v in o.values(): walk(v)
              elif isinstance(o, list):
                  for v in o: walk(v)
          walk(d)
          PY
                else
                  echo "ℹ️ No xcresult (Flutter failed earlier). Showing last 200 lines of Flutter log:"
                  tail -n 200 "$LOG"
                  echo "ℹ️ Grepping for common asset/build errors:"
                  egrep -i 'No file or variants|AssetNotFound|Exception|error:' "$LOG" | tail -n 50 || true
                fi
                exit 1
              fi

              echo "✅ Flutter iOS compile succeeded"


      - name: Archive with Xcode (guarantee .xcarchive exists)
        script: |
          set -euo pipefail

          # Make sure profiles are applied already:
          xcode-project use-profiles

          ARCHIVE="build/ios/archive/Runner.xcarchive"
          mkdir -p "$(dirname "$ARCHIVE")"

          # Build the archive for generic iOS device
          xcodebuild -workspace ios/Runner.xcworkspace \
                    -scheme Runner \
                    -configuration Release \
                    -archivePath "$ARCHIVE" \
                    -destination 'generic/platform=iOS' \
                    archive | xcpretty || {
            echo "❌ xcodebuild archive failed"
            exit 1
          }

          if [ ! -d "$ARCHIVE" ]; then
            echo "❌ Archive missing at $ARCHIVE"
            # Try to discover any recent .xcarchive Flutter/Xcode may have created
            FOUND="$(find build -type d -name '*.xcarchive' | head -n1 || true)"
            if [ -n "$FOUND" ]; then
              echo "ℹ️ Found alternate archive: $FOUND"
              ln -s "$FOUND" "$ARCHIVE"
            else
              exit 1
            fi
          fi

          echo "✅ Archive created at: $ARCHIVE"

      - name: Show build outputs
        script: |
          set -e
          echo "== Tree: build/ios =="
          find build/ios -maxdepth 3 -type d -print | sed 's/^/DIR /'
          find build/ios -maxdepth 3 -type f -print | sed 's/^/FILE /'
          echo "== IPA candidates =="
          ls -la build/ios/ipa || true
          ls -la build/ios/archive || true

      - name: Skip export if IPA already exists
        script: |
          set -e
          if ls build/ios/ipa/*.ipa >/dev/null 2>&1; then
            echo "✅ IPA already present, skipping manual export"
            exit 0
          fi
          echo "ℹ️ No IPA yet; proceeding to export from .xcarchive"


      - name: Export IPA from .xcarchive (manual profile mapping)
        script: |
          set -euo pipefail
          ARCHIVE="build/ios/archive/Runner.xcarchive"
          EXPORT_DIR="build/ios/ipa"
          PLIST="$EXPORT_DIR/ExportOptions.plist"
          mkdir -p "$EXPORT_DIR"

          # Find an App Store profile for our bundle id & team
          pick_profile() {
            local target_bid="$1" team="$2"
            local chosen_path="" chosen_name=""

            for f in "$HOME/Library/MobileDevice/Provisioning Profiles/"*.mobileprovision; do
              [ -f "$f" ] || continue
              tmp="$(mktemp)"; /usr/bin/security cms -D -i "$f" > "$tmp" 2>/dev/null || continue

              bid=$(/usr/libexec/PlistBuddy -c 'Print Entitlements:application-identifier' "$tmp" 2>/dev/null | sed 's/^[^.]*\.//')
              team_id=$(/usr/libexec/PlistBuddy -c 'Print TeamIdentifier:0' "$tmp" 2>/dev/null || true)
              name=$(/usr/libexec/PlistBuddy -c 'Print Name' "$tmp" 2>/dev/null || true)
              # App Store profiles do NOT contain "ProvisionedDevices"
              if /usr/libexec/PlistBuddy -c 'Print ProvisionedDevices' "$tmp" >/dev/null 2>&1; then has_devices=1; else has_devices=0; fi
              # Distribution profile must have get-task-allow = false
              gtl=$(/usr/libexec/PlistBuddy -c 'Print Entitlements:get-task-allow' "$tmp" 2>/dev/null || echo false)

              rm -f "$tmp"

              if [ "$bid" = "$target_bid" ] && [ "$team_id" = "$team" ] && [ "$has_devices" -eq 0 ] && [ "$gtl" = "false" ]; then
                chosen_path="$f"; chosen_name="$name"; break
              fi
            done

            if [ -z "$chosen_name" ]; then
              echo "❌ No matching App Store profile found for $target_bid ($team)" >&2
              exit 70
            fi
            echo "$chosen_name"
          }

          PROFILE_NAME="$(pick_profile "$BUNDLE_ID" "$APPLE_TEAM_ID")"
          echo "📄 Using provisioning profile: $PROFILE_NAME"

          # Create ExportOptions.plist for manual signing
          /usr/libexec/PlistBuddy -c "Add :teamID string $APPLE_TEAM_ID" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :method string app-store" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :destination string export" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :signingStyle string manual" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :signingCertificate string Apple Distribution" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :uploadSymbols bool true" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :compileBitcode bool false" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles dict" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:$BUNDLE_ID string $PROFILE_NAME" "$PLIST"

          echo "📝 ExportOptions.plist:"
          cat "$PLIST"

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE" \
            -exportOptionsPlist "$PLIST" \
            -exportPath "$EXPORT_DIR" | xcpretty

          ls -l "$EXPORT_DIR"
          echo "✅ Exported IPA(s) to $EXPORT_DIR"

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/ipa/*.dSYM.zip

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
